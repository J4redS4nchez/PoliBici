<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">

  <title>PoliBICI – Restablecer contraseña</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style_cambiar_contrasena.css') }}">
</head>
<body>
  <!-- Barra superior SOLO con el logo -->
  <header class="topbar" role="banner">
    <a class="brand-link" href="{{ url_for('login') }}">
      <span class="brand">PoliBICI</span>
    </a>
  </header>

  <!-- Contenido principal -->
  <main class="wrap">
    <section class="card" aria-label="Restablecer contraseña">
      <div class="card-header">
        <h1>Restablecer contraseña</h1>
      </div>

      <div class="card-body">
        <p>
          Escribe una <strong>nueva contraseña</strong> para tu cuenta PoliBICI.
          Este enlace solo es válido por un tiempo limitado.
        </p>

        {% with msgs = get_flashed_messages(with_categories=true) %}
          {% if msgs %}
            {% set last = msgs[-1] %}
            <div class="flash {{ last[0] }}" role="status">{{ last[1] }}</div>
          {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('olvido.reset_password') }}">
          <input type="hidden" name="token" value="{{ token }}">

          <div class="form-row">
            <input
              id="password"
              name="password"
              type="password"
              class="input"
              placeholder="Nueva contraseña"
              required
              autocomplete="new-password"
            >
          </div>

          <div class="card-footer">
            <a class="btn btn-sec" href="{{ url_for('login') }}">Cancelar</a>
            <button class="btn btn-guinda" type="submit">Cambiar contraseña</button>
          </div>
        </form>
      </div>
    </section>
  </main>
</body>
</html>
